version: "3.8"

services:
  postgres:
    image: postgres:17
    container_name: test-db

    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: performance_test

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

    mem_limit: 4G
    cpus: 2

    networks:
      - benchmark-network

volumes:
  pgdata:

networks:
  benchmark-network:
    external: true